<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella Joias — Acessórios Femininos</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Bella Joias</span>
      </div>
      <button class="cart-toggle" id="cartToggle" aria-label="Ver carrinho">
        <span class="cart-icon">🛍</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
    </div>
  </header>

  <main class="store-layout">
    <section class="products-section">
      <h2 class="section-title">Nossa Coleção</h2>
      <div class="products-grid" id="productsGrid">
        <div class="loading">Carregando produtos...</div>
      </div>
    </section>

    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3>Seu Carrinho</h3>
        <button class="close-cart" id="closeCart" aria-label="Fechar carrinho">×</button>
      </div>
      <div class="cart-items" id="cartItems">
        <p class="cart-empty">Seu carrinho está vazio</p>
      </div>
      <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="cart-total">
          Total: <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <button class="btn-checkout" id="btnCheckout">Finalizar Pedido</button>
      </div>
    </aside>
  </main>

  <div class="checkout-overlay" id="checkoutOverlay" style="display:none">
    <div class="checkout-modal">
      <div class="checkout-header">
        <h3>Endereço de Entrega</h3>
        <button class="close-checkout" id="closeCheckout" aria-label="Fechar">×</button>
      </div>
      <div class="checkout-body">
        <div class="form-group">
          <label for="ckCep">CEP *</label>
          <input id="ckCep" type="text" placeholder="00000-000" maxlength="9"
            inputmode="numeric" autocomplete="postal-code">
          <div class="cep-status" id="ckCepStatus"></div>
        </div>
        <div class="form-row-2">
          <div class="form-group fg-rua">
            <label for="ckRua">Rua *</label>
            <input id="ckRua" type="text" placeholder="Rua, Avenida..." readonly>
          </div>
          <div class="form-group fg-num">
            <label for="ckNumero">Número *</label>
            <input id="ckNumero" type="text" placeholder="123" autocomplete="address-line2">
          </div>
        </div>
        <div class="form-group">
          <label for="ckComp">Complemento <span class="lbl-opt">(opcional)</span></label>
          <input id="ckComp" type="text" placeholder="Apto, bloco, casa...">
        </div>
        <div class="form-group">
          <label for="ckBairro">Bairro *</label>
          <input id="ckBairro" type="text" placeholder="Bairro" readonly>
        </div>
        <div class="form-row-2">
          <div class="form-group fg-cidade">
            <label for="ckCidade">Cidade</label>
            <input id="ckCidade" type="text" placeholder="Cidade" readonly>
          </div>
          <div class="form-group fg-uf">
            <label for="ckEstado">UF</label>
            <input id="ckEstado" type="text" placeholder="UF" maxlength="2" readonly>
          </div>
        </div>
        <div class="frete-card" id="freteCard" style="display:none">
          <div class="frete-card-row">
            <span>Prazo de entrega</span>
            <span id="fretePrazo"></span>
          </div>
          <div class="frete-card-row frete-card-valor">
            <span>Frete</span>
            <strong id="freteCardValor"></strong>
          </div>
        </div>
        <div class="checkout-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="ckSubtotal">R$ 0,00</span>
          </div>
          <div class="summary-row" id="ckFreteRow" style="display:none">
            <span>Frete</span>
            <span id="ckFreteVal"></span>
          </div>
          <div class="summary-row summary-total">
            <strong>Total</strong>
            <strong id="ckTotal">R$ 0,00</strong>
          </div>
        </div>
      </div>
      <button class="btn-confirm-pay" id="btnConfirmPay">Confirmar e Pagar</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <span class="modal-icon">✓</span>
      <h3>Pedido Realizado!</h3>
      <p id="modalMsg">Seu pedido foi criado com sucesso.</p>
      <button class="btn-modal-close" id="btnModalClose">Continuar Comprando</button>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
